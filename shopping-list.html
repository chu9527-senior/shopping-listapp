<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 span.icon {
      font-size: 1.8rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.2s;
      color: #2d3748;
    }

    .input-row input:focus {
      outline: none;
      border-color: #667eea;
    }

    .input-row input:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
    }

    .input-row button {
      padding: 12px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover {
      background: #fff5f5;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
      transition: color 0.2s;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    li .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 36px 0;
      font-size: 0.95rem;
    }

    .empty .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="100">
      <button id="addBtn" type="button">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">총 0개</span>
      <button id="clearBtn" class="clear-btn" type="button">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty">
      <div class="empty-icon">🛍️</div>
      <div>아직 아이템이 없어요.<br>위에서 추가해 보세요!</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://exgnqumeqdllugwazjga.supabase.co/rest/v1';
    const SUPABASE_KEY = 'sb_publishable_qfVL666W3QGXEZ3_eQe7Tg_JeYvXwhv';
    const SB_HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let items = [];

    async function loadItems() {
      try {
        const res = await fetch(`${SUPABASE_URL}/shopping_items?order=created_at`, { headers: SB_HEADERS });
        if (!res.ok) throw new Error(await res.text());
        items = await res.json();
        render();
      } catch (e) {
        console.error('로드 오류:', e);
      }
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('statsText');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '총 0개';
        return;
      }

      empty.style.display = 'none';
      const done = items.filter(i => i.checked).length;
      stats.textContent = `총 ${items.length}개 · 완료 ${done}개`;

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.addEventListener('change', () => toggle(item.id, item.checked));

        const name = document.createElement('span');
        name.className = 'item-name';
        name.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.addEventListener('click', () => remove(item.id));

        li.appendChild(cb);
        li.appendChild(name);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;
      try {
        const res = await fetch(`${SUPABASE_URL}/shopping_items`, {
          method: 'POST',
          headers: SB_HEADERS,
          body: JSON.stringify({ name, checked: false })
        });
        if (!res.ok) throw new Error(await res.text());
        const [newItem] = await res.json();
        items.push(newItem);
        render();
        input.value = '';
        input.focus();
      } catch (e) {
        console.error('추가 오류:', e);
      }
    }

    async function toggle(id, currentChecked) {
      try {
        await fetch(`${SUPABASE_URL}/shopping_items?id=eq.${id}`, {
          method: 'PATCH',
          headers: SB_HEADERS,
          body: JSON.stringify({ checked: !currentChecked })
        });
        const item = items.find(i => i.id === id);
        if (item) item.checked = !currentChecked;
        render();
      } catch (e) {
        console.error('토글 오류:', e);
      }
    }

    async function remove(id) {
      try {
        await fetch(`${SUPABASE_URL}/shopping_items?id=eq.${id}`, {
          method: 'DELETE',
          headers: SB_HEADERS
        });
        items = items.filter(i => i.id !== id);
        render();
      } catch (e) {
        console.error('삭제 오류:', e);
      }
    }

    async function clearChecked() {
      try {
        await fetch(`${SUPABASE_URL}/shopping_items?checked=eq.true`, {
          method: 'DELETE',
          headers: SB_HEADERS
        });
        items = items.filter(i => !i.checked);
        render();
      } catch (e) {
        console.error('완료 삭제 오류:', e);
      }
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
    document.getElementById('addBtn').addEventListener('click', addItem);
    document.getElementById('clearBtn').addEventListener('click', clearChecked);

    loadItems();
  </script>
</body>
</html>
